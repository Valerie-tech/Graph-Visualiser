<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Graph Algorithms Visualiser</title>

    <!-- Link external CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

  

<!-- ===================== TOP BUTTON BAR ===================== -->
<div id="topBar">
    <button id="runDijkstra" class="algoBtn" title="Imagine you have a map of all cities linked by roads of different lengths.
        Dijkstra answers:
            What are the shortest ways to travel starting from my home?">
        Dijkstra
    </button>

    <button id="runKruskal" class="algoBtn" title="Imagine you have a map of all cities linked by roads of different lengths.
        Kruskal answers:
            How do I connect all cities together as cheaply as possible? (Same as Prim)">
        Kruskal
    </button>

    <button id="runPrim" class="algoBtn" title="Imagine you have a map of all cities linked by roads of different lengths.
        Prim answers:
            How do I connect all cities together as cheaply as possible? (Same as Kruksal)">
        Prim
    </button>

    <button id="runFW" class="algoBtn" title="Imagine you have a map of all cities linked by roads of different lengths.
        Floyd-Warshall answers:
            What is the shortest way to travel between every pair of cities - no matter where I start, or where I end up">
        Floyd-Warshall
    </button>

    <h4 style="color:white;">Hover over each button on the left for a brief analogy.  Click for a full explanation and demonstration</h4>

    <!-- Close button on the right side -->
    <button id="closeBtn" class="rightBtn">Close</button>
</div>

<!-- ===================== MAIN 3-PANEL LAYOUT ===================== -->
<div id="container">

    <!-- Left Panel: Graph -->
    <div class="panel">
        <canvas id="graphCanvas"></canvas>
    </div>

    <!-- Middle Panel: Explanation + Algorithm‑Specific UI -->
    <div class="panel">
        <h3>Explanation</h3>
        <div id="explain"></div>

        <!-- Prim start-node buttons -->
        <div id="primStartButtons"></div>

        <!-- Floyd–Warshall matrices -->
        <h3 id="fwMatricesTitle" style="display:none;">Floyd–Warshall Matrices</h3>
        <div id="fwMatrices"></div>

        <!-- Buttons for “paths from X” -->
        <div id="fwStartButtons"></div>
    </div>

    <!-- Right Panel: Step output -->
    <div class="panel">
        <h3>Steps</h3>
        <div id="steps"></div>
    </div>

</div>

<!-- ===================== BOTTOM PLAY/STEP BAR ===================== -->
<div id="bottomControls">

    <button id="playBtn" title="" disabled>Play</button>
    <button id="stepBtn" title="" disabled>Step</button>

</button>
</div>

<!-- Link external script -->
<script src="script.js"></script>

</body>
</html>
